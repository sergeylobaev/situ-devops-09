name: LINT-TEST-BUILD-CHECK
on:
  push:
    branches: [ dev ]

jobs:
  # проверка кода python линтером
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: pylint server/application.py

  # тестирование кода приложения
  unit-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: cd server && pytest --junitxml=junit/test-results.xml

  # тестирование сборки приложения в docker
  build-test:
    needs: [ lint, unit-tests ]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t test-image ./server --file ./server/dockerfile
      - run: docker run -d --name app-server8000 -p 8000:8000 --restart unless-stopped test-image
      - run: sleep 5
      - run: docker ps -a
      - run: curl --retry 5 --retry-delay 2 --retry-connrefused 127.0.0.1:8000
